name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        # oxlint native bindings require newer Node releases than our Node 18 CI lane.
        if: ${{ matrix.node-version >= 20 }}
        run: npm run lint:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npm pack
